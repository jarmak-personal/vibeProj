    { name = "cupy-cuda13x", marker = "extra == 'cu13'", specifier = ">=14" },
    { name = "numpy", specifier = ">=2" },
    { name = "pyproj", specifier = ">=3.7.0" },
]
provides-extras = ["cu12", "cu13"]

[package.metadata.requires-dev]
dev = [
    { name = "furo", specifier = ">=2025.12.19" },
    { name = "mypy", specifier = ">=1.14" },
    { name = "myst-parser", specifier = ">=5.0.0" },
    { name = "pytest", specifier = ">=8.3" },
    { name = "pytest-cov", specifier = ">=6.0" },
    { name = "ruff", specifier = ">=0.11" },
    { name = "sphinx", specifier = ">=9.1.0" },
    { name = "sphinx-autoapi", specifier = ">=3.6" },
]
gpu-dev = [{ name = "cupy-cuda12x", specifier = ">=13" }]
